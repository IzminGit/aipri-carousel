<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>aipri-carousel</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --card-width: min(35vw, 150px);
    --lane-height: min(74vw, calc(100dvh - 72px), 330px);
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Maru Gothic ProN", sans-serif;
    background: linear-gradient(135deg, #ffe4f0 0%, #f4e7ff 48%, #e4f4ff 100%);
    color: #7a336c;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  .app {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 12px;
  }

  .lane-wrap {
    width: 100%;
    align-self: center;
    border-radius: 28px;
    padding: clamp(10px, 2.5dvh, 18px) 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.95), transparent 24%),
      linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.36));
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,0.62),
      0 16px 40px rgba(188, 80, 160, 0.18);
    overflow: hidden;
    position: relative;
  }

  .lane-wrap::before,
  .lane-wrap::after {
    content: "";
    position: absolute;
    top: 0;
    width: 54px;
    height: 100%;
    z-index: 3;
    pointer-events: none;
  }

  .lane-wrap::before {
    left: 0;
    background: linear-gradient(90deg, rgba(255,228,240,0.98), transparent);
  }

  .lane-wrap::after {
    right: 0;
    background: linear-gradient(270deg, rgba(228,244,255,0.98), transparent);
  }

  .track-viewport {
    height: var(--lane-height);
    overflow: hidden;
    position: relative;
    touch-action: none;
  }

  .track {
    position: absolute;
    left: 0;
    top: 50%;
    display: flex;
    align-items: center;
    gap: 16px;
    width: max-content;
    will-change: transform;
  }

  .card-button {
    width: var(--card-width);
    flex: 0 0 var(--card-width);
    border: none;
    background: transparent;
    padding: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .card-button:active {
    transform: scale(0.94);
  }

  .card {
    border-radius: 12px;
    overflow: hidden;
    background: rgba(255,255,255,0.85);
    box-shadow: 0 8px 26px rgba(180, 80, 160, 0.22);
    position: relative;
    min-height: 160px;
    display: grid;
    place-items: center;
    color: #c73691;
    font-weight: 900;
    font-size: 12px;
  }

  .card.rarity-4 {
    box-shadow: 0 8px 28px rgba(245, 190, 50, 0.44);
  }

  .card.rarity-3 {
    box-shadow: 0 8px 26px rgba(155, 155, 210, 0.34);
  }

  .card img {
    width: 100%;
    display: block;
    pointer-events: none;
  }

  .card-caption {
    margin-top: 6px;
    font-size: 10px;
    font-weight: 800;
    color: #b84893;
    line-height: 1.25;
    height: 2.5em;
    overflow: hidden;
    text-align: center;
    text-shadow: 0 1px 0 rgba(255,255,255,0.9);
  }

  .modal {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
    background: rgba(64, 22, 58, 0.48);
    z-index: 10;
  }

  .modal.open {
    display: grid;
  }

  .modal-card {
    width: min(calc((100dvh - 20px) * 0.6847), calc(100vw - 20px), 460px);
    aspect-ratio: 152 / 222;
    position: relative;
    display: grid;
    place-items: center;
    transform-origin: center;
    --entry-x: 0px;
    --entry-y: 0px;
    --entry-scale: 0.28;
    --entry-spin: -70deg;
    --entry-rebound-spin: 12deg;
    --entry-settle-spin: -5deg;
  }

  .modal-card.entering {
    animation: card-arrive 0.78s cubic-bezier(0.18, 0.9, 0.24, 1.16) both;
  }

  .close-button {
    position: fixed;
    top: max(10px, env(safe-area-inset-top));
    right: max(10px, env(safe-area-inset-right));
    width: 38px;
    height: 38px;
    border: none;
    border-radius: 50%;
    background: rgba(247, 227, 242, 0.95);
    color: #b53686;
    font-size: 22px;
    font-weight: 900;
    z-index: 11;
  }

  .large-card-scene {
    width: 100%;
    height: 100%;
    perspective: 900px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .large-card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .large-card-face {
    position: absolute;
    inset: 0;
    border-radius: 18px;
    overflow: hidden;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    box-shadow: 0 12px 34px rgba(160, 80, 150, 0.26);
  }

  .large-card-face.card-back {
    transform: rotateY(180deg);
  }

  .large-card-face img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
  }

  .large-card-face::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.5) 50%, transparent 60%);
    background-size: 200% 200%;
    background-position: 200% 200%;
    border-radius: 18px;
    pointer-events: none;
  }

  .large-card-scene.shimmering .large-card-face::after {
    animation: shimmer 0.6s ease-out;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 200%; }
    100% { background-position: -50% -50%; }
  }

  @keyframes card-arrive {
    0% {
      opacity: 0;
      transform: translate3d(var(--entry-x), var(--entry-y), 0) scale(var(--entry-scale)) rotateY(var(--entry-spin)) rotateZ(-8deg);
      filter: drop-shadow(0 0 0 rgba(255,255,255,0));
    }
    58% {
      opacity: 1;
      transform: translate3d(0, -8px, 0) scale(1.06) rotateY(var(--entry-rebound-spin)) rotateZ(5deg);
      filter: drop-shadow(0 0 18px rgba(255, 214, 246, 0.86));
    }
    78% {
      transform: translate3d(0, 3px, 0) scale(0.98) rotateY(var(--entry-settle-spin)) rotateZ(-2deg);
    }
    100% {
      opacity: 1;
      transform: translate3d(0, 0, 0) scale(1) rotateY(0deg) rotateZ(0deg);
      filter: drop-shadow(0 0 0 rgba(255,255,255,0));
    }
  }

  .particle {
    position: fixed;
    pointer-events: none;
    animation: particle-fly 1.2s ease-out forwards;
    z-index: 100;
    will-change: transform, opacity;
  }

  @keyframes particle-fly {
    0%   { transform: translate(0,0) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--tx),var(--ty)) scale(0.3) rotate(var(--rot)); opacity: 0; }
  }

  @media (min-width: 700px) {
    :root {
      --card-width: min(22vw, 180px);
      --lane-height: min(54vw, calc(100dvh - 72px), 390px);
    }

    .track {
      gap: 22px;
    }
  }

  @media (orientation: landscape) and (max-height: 500px) {
    :root {
      --card-width: min(22vw, 180px);
      --lane-height: min(54vw, calc(100dvh - 72px), 330px);
    }

    .app {
      padding: max(10px, env(safe-area-inset-top)) 0 max(10px, env(safe-area-inset-bottom));
    }

    .lane-wrap {
      border-radius: 0;
    }

    .modal {
      padding: max(6px, env(safe-area-inset-top)) 0 max(6px, env(safe-area-inset-bottom));
    }

    .modal-card {
      width: min(calc((100dvh - 12px) * 0.6847), 100vw, 460px);
    }
  }
</style>
</head>
<body>
<div class="app">
  <main class="lane-wrap">
    <div class="track-viewport" id="viewport" aria-label="カード表示エリア">
      <div class="track" id="track"></div>
    </div>
  </main>
</div>

<div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="カード詳細">

          <img id="large-back-image" src="" alt="カード裏面" draggable="false" />
        </div>
      </div>
    </div>
  </section>
</div>

      { id:'OP-032',   name:'おねがいパティシエール ポムポムプリン',   char:'おりびあ', rarity:4 },
      { id:'OP-021',   name:'やきたてクッキーいちごミルク',           char:'あおい',   rarity:4 },
      { id:'OP-022',   name:'すきすきハートバズリウム',       char:'いのり', rarity:4 },
      { id:'OP-015',   name:'ほしのゆうびんやさんイエロー',   char:'あおい', rarity:4 },
      { id:'OP-020',   name:'ラブリーマーガレットイエロー',   char:'いのり', rarity:4 },
      { id:'OP-018',   name:'トキメキトゥインクルグリーン',   char:'ぐみ',   rarity:4 },
      { id:'OP-014',   name:'すきのクリスタルいのりピンク',   char:'いのり', rarity:4 },
      { id:'OTOY-015', name:'プリズムハートパープル',         char:'あおい', rarity:4 },
      { id:'OTOY-005', name:'リボンアイドルパステル',         char:'あおい', rarity:4 },
      { id:'OTOY-004', name:'リボンアイドルパステル',         char:'いのり', rarity:4 },
      { id:'OTOY-003', name:'アイプリゆめゆめブルー',         char:'あおい', rarity:4 },
      { id:'OTOY-002', name:'アイプリすきすきレッド',         char:'いのり', rarity:4 },
      { id:'OTOY-001', name:'プリズムハートブルー',           char:'あおい', rarity:4 },
      { id:'OTOY-000', name:'プリズムハートピンク',           char:'いのり', rarity:4 },
    ]
  },
  {
    label: 'コレクショングミ',
    base: 'https://aipri.jp/card/img/gumi/',
    cards: [
      { id:'OG1-001', name:'リボンバレリーナオーロラピンク',       char:'あおい', rarity:3 },
      { id:'OG1-002', name:'リボンバレリーナオーロラピンク',       char:'いのり', rarity:3 },
      { id:'OG1-003', name:'リボンバレリーナオーロラピンク',       char:'ぐみ',   rarity:3 },
      { id:'OG1-005', name:'すきすきハートバズリウムパープル',      char:'いのり', rarity:3 },
      { id:'OG1-006', name:'ブルーソーダ',                         char:'ぐみ',   rarity:3 },
      { id:'OG1-007', name:'ブルーソーダ',                         char:'いのり', rarity:3 },
      { id:'OG1-008', name:'ブルーソーダ',                         char:'あおい', rarity:3 },
      { id:'OG1-009', name:'いたずらモンスター',                   char:'ぐみ',   rarity:3 },
      { id:'OG1-010', name:'いたずらモンスター',                   char:'あおい', rarity:3 },
      { id:'OG1-011', name:'ローズプリンス',                       char:'あおい', rarity:3 },
      { id:'OG1-012', name:'ローズプリンス',                       char:'いのり', rarity:3 },
      { id:'OG1-013', name:'リトルプリンセス',                     char:'いのり', rarity:3 },
      { id:'OG1-014', name:'リトルプリンセス',                     char:'あおい', rarity:3 },
    ]
  },
  {
    label: 'ミルフィーカード',
    base: 'https://aipri.jp/card/img/millefeui/',
    cards: [
      { id:'OM1-001', name:'ハピネスキューピッド',                             char:'いのり', rarity:3 },
      { id:'OM1-002', name:'ハピネスバタフライ',                               char:'あおい', rarity:3 },
      { id:'OM1-003', name:'アニマルロックミント',                             char:'ぐみ',   rarity:3 },
      { id:'OM1-004', name:'フラワーエプロングリーン',                         char:'ぐみ',   rarity:3 },
      { id:'OM1-005', name:'にゃんにゃんロリータブルー',                       char:'あおい', rarity:3 },
      { id:'OM1-006', name:'うさぎぬいぐるみオレンジ',                         char:'いのり', rarity:3 },
      { id:'OM1-007', name:'レディーフライトピンク',                           char:'いのり', rarity:3 },
      { id:'OM1-008', name:'アイプリバースフューチャースクールクールパープル', char:'あおい', rarity:3 },
    ]
  },
];

// 「全て」タブ用：全セットのカードをbase URL付きで結合
SETS[0].cards = SETS.slice(1).flatMap(s => s.cards.map(c => ({ ...c, base: s.base })));

const CARDS = SETS[0].cards;
const PARTICLES = ['♡','✦','★','✿','💫','🌸','✨'];
const PARTICLE_COLORS_4 = ['#f5c842','#ffe680','#ff9ecc','#c8a0ff'];
const PARTICLE_COLORS_3 = ['#d0d0d0','#e8e8e8','#c0c0e8','#b0d0ff'];
const PARTICLE_COLORS_2 = ['#ff9ec4','#ffcce0','#ffa0d0','#ffb0e8'];

  const track = document.getElementById("track");
  const viewport = document.getElementById("viewport");
  const modal = document.getElementById("modal");
  const modalCard = modal.querySelector(".modal-card");
  const largeCardScene = document.getElementById("large-card-scene");
  const largeCardInner = document.getElementById("large-card-inner");
  const largeFrontImage = document.getElementById("large-front-image");
  const largeBackImage = document.getElementById("large-back-image");

  let selectedCard = null;
  let currentSide = "O";
  let largeCurrentDeg = 0;
  let paused = false;
  let speedPxPerSec = 56;
  let x = 0;
  let trackWidth = 0;
  let lastTime = 0;
  let rafId = 0;
  let resumeTimer = 0;
  let dragPointerId = null;
  let dragStartX = 0;
  let dragLastX = 0;
  let isDraggingLane = false;
  let suppressNextCardClick = false;

  function imgUrl(card, side) {
    return `${card.base}${card.id}_${side}.webp`;
  }

  function renderTrack() {
    track.innerHTML = "";

    // 2周分を描画。左に流れきったら位置を戻してループする。
    const loopCards = [...CARDS, ...CARDS];

    loopCards.forEach((card, index) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "card-button";
      button.setAttribute("aria-label", `${card.id} ${card.name} を開く`);

      const cardEl = document.createElement("div");
      cardEl.className = `card rarity-${card.rarity}`;

      const img = document.createElement("img");
      img.src = imgUrl(card, "O");
      img.alt = `${card.name} 表面`;
      img.loading = index < CARDS.length ? "eager" : "lazy";
      img.onerror = () => {
        cardEl.textContent = `${card.id}\n画像未取得`;
      };

      const caption = document.createElement("div");
      caption.className = "card-caption";
      caption.textContent = card.name;

      cardEl.appendChild(img);
      button.appendChild(cardEl);
      button.appendChild(caption);

      button.addEventListener("click", (event) => openCard(card, "O", event));
      track.appendChild(button);
    });

    measure();
    resetFlow();
  }

  function measure() {
    // 2周分描画しているので、1周分の横幅
    trackWidth = Math.max(1, track.scrollWidth / 2);
    applyTrackPosition();
  }

  function applyTrackPosition() {
    track.style.transform = `translate3d(${x}px, -50%, 0)`;
  }

  function normalizeTrackPosition() {
    if (!trackWidth) return;
    while (x <= -trackWidth) x += trackWidth;
  }

  function resetFlow() {
    // 右端の外側から流れてくるように開始
    x = viewport.clientWidth + 16;
    lastTime = performance.now();
    applyTrackPosition();
  }

  function animate(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000 || 0);
    lastTime = now;

    if (!paused) {
      x -= speedPxPerSec * dt;

      // 1周分流れたら、自然につながる位置へ戻す
      if (x <= -trackWidth) {
        x += trackWidth;
      }

      applyTrackPosition();
    }

    rafId = requestAnimationFrame(animate);
  }

  function scheduleLaneResume() {
    window.clearTimeout(resumeTimer);
    resumeTimer = window.setTimeout(() => {
      if (!selectedCard) {
        paused = false;
        lastTime = performance.now();
      }
    }, 500);
  }

  function handleLanePointerDown(event) {
    if (selectedCard || dragPointerId !== null || event.button !== 0) return;
    dragPointerId = event.pointerId;
    dragStartX = event.clientX;
    dragLastX = event.clientX;
    isDraggingLane = false;
    window.clearTimeout(resumeTimer);
    viewport.setPointerCapture?.(event.pointerId);
  }

  function handleLanePointerMove(event) {
    if (event.pointerId !== dragPointerId) return;

    const totalDx = event.clientX - dragStartX;
    const frameDx = event.clientX - dragLastX;
    dragLastX = event.clientX;

    if (!isDraggingLane && Math.abs(totalDx) > 8) {
      isDraggingLane = true;
      suppressNextCardClick = true;
      paused = true;
    }

    if (!isDraggingLane) return;

    event.preventDefault();
    x += frameDx;
    normalizeTrackPosition();
    applyTrackPosition();
  }

  function handleLanePointerEnd(event) {
    if (event.pointerId !== dragPointerId) return;
    viewport.releasePointerCapture?.(event.pointerId);
    dragPointerId = null;

    if (isDraggingLane) {
      isDraggingLane = false;
      scheduleLaneResume();
      window.setTimeout(() => {
        suppressNextCardClick = false;
      }, 300);
    }
  }

  function handleLaneTouchStart(event) {
    if (selectedCard || dragPointerId !== null || event.touches.length !== 1) return;
    const touch = event.touches[0];
    dragPointerId = `touch-${touch.identifier}`;
    dragStartX = touch.clientX;
    dragLastX = touch.clientX;
    isDraggingLane = false;
    window.clearTimeout(resumeTimer);
  }

  function handleLaneTouchMove(event) {
    if (typeof dragPointerId !== "string" || !dragPointerId.startsWith("touch-")) return;
    const touchId = Number(dragPointerId.slice(6));
    const touch = Array.from(event.touches).find(item => item.identifier === touchId);
    if (!touch) return;

    const totalDx = touch.clientX - dragStartX;
    const frameDx = touch.clientX - dragLastX;
    dragLastX = touch.clientX;

    if (!isDraggingLane && Math.abs(totalDx) > 8) {
      isDraggingLane = true;
      suppressNextCardClick = true;
      paused = true;
    }

    if (!isDraggingLane) return;

    event.preventDefault();
    x += frameDx;
    normalizeTrackPosition();
    applyTrackPosition();
  }

  function handleLaneTouchEnd(event) {
    if (typeof dragPointerId !== "string" || !dragPointerId.startsWith("touch-")) return;
    const touchId = Number(dragPointerId.slice(6));
    const ended = Array.from(event.changedTouches).some(item => item.identifier === touchId);
    if (!ended) return;

    dragPointerId = null;
    if (isDraggingLane) {
      isDraggingLane = false;
      scheduleLaneResume();
      window.setTimeout(() => {
        suppressNextCardClick = false;
      }, 300);
    }
  }

  function openCard(card, side, event) {
    const sourceRect = event?.currentTarget?.querySelector(".card")?.getBoundingClientRect();
    selectedCard = card;
    currentSide = side;
    paused = true;
    window.clearTimeout(resumeTimer);
    largeCurrentDeg = side === "U" ? 180 : 0;
    largeCardInner.style.transition = "none";
    largeCardInner.style.transform = `rotateY(${largeCurrentDeg}deg)`;

    largeFrontImage.src = imgUrl(card, "O");
    largeFrontImage.alt = `${card.name} 表面`;
    largeBackImage.src = imgUrl(card, "U");
    largeBackImage.alt = `${card.name} 裏面`;
    modalCard.classList.remove("entering");
    modal.classList.add("open");
    if (sourceRect) {
      const targetRect = modalCard.getBoundingClientRect();
      const sourceCenterX = sourceRect.left + sourceRect.width / 2;
      const sourceCenterY = sourceRect.top + sourceRect.height / 2;
      const targetCenterX = targetRect.left + targetRect.width / 2;
      const targetCenterY = targetRect.top + targetRect.height / 2;
      const entryScale = Math.max(0.08, sourceRect.width / targetRect.width);
      const spinDirection = sourceCenterX < targetCenterX ? -1 : 1;
      const entrySpin = 82 * spinDirection;

      modalCard.style.setProperty("--entry-x", `${sourceCenterX - targetCenterX}px`);
      modalCard.style.setProperty("--entry-y", `${sourceCenterY - targetCenterY}px`);
      modalCard.style.setProperty("--entry-scale", entryScale.toFixed(4));
      modalCard.style.setProperty("--entry-spin", `${entrySpin}deg`);
      modalCard.style.setProperty("--entry-rebound-spin", `${entrySpin * -0.16}deg`);
      modalCard.style.setProperty("--entry-settle-spin", `${entrySpin * 0.07}deg`);
    }
    modalCard.offsetWidth;
    modalCard.classList.add("entering");
    const cx = event?.clientX ?? window.innerWidth / 2;
    const cy = event?.clientY ?? window.innerHeight / 2;
    spawnParticles(cx, cy, card.rarity);
    requestAnimationFrame(() => requestAnimationFrame(() => {
      largeCardInner.style.transition = "";
    }));
  }

  function closeModal() {
    modal.classList.remove("open");
    modalCard.classList.remove("entering");
    selectedCard = null;
    paused = false;
    lastTime = performance.now();
  }

  function spawnParticles(x, y, rarity) {
    const colors = rarity === 4 ? PARTICLE_COLORS_4 : rarity === 3 ? PARTICLE_COLORS_3 : PARTICLE_COLORS_2;
    const count = rarity === 4 ? 12 : rarity === 3 ? 9 : 7;

    for (let i = 0; i < count; i++) {
      const el = document.createElement("div");
      el.className = "particle";
      el.textContent = PARTICLES[Math.floor(Math.random() * PARTICLES.length)];

      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const dist = 80 + Math.random() * 80;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist - 40;
      const rot = (Math.random() - 0.5) * 360;

      el.style.cssText = `
        left:${x}px; top:${y}px;
        color:${colors[Math.floor(Math.random() * colors.length)]};
        --tx:${tx}px; --ty:${ty}px; --rot:${rot}deg;
        animation-delay:${Math.random() * 0.1}s;
        font-size:${14 + Math.random() * 14}px;
      `;

      document.body.appendChild(el);
      el.addEventListener("animationend", () => el.remove());
    }
  }

  function flipLargeCard(event) {
    if (!selectedCard) return;
    const rect = largeCardScene.getBoundingClientRect();
    const cx = event?.clientX ?? rect.left + rect.width / 2;
    const cy = event?.clientY ?? rect.top + rect.height / 2;
    const tapRight = cx >= rect.left + rect.width / 2;

    currentSide = currentSide === "O" ? "U" : "O";
    largeCurrentDeg += tapRight ? 180 : -180;
    largeCardInner.style.transition = "transform 0.65s cubic-bezier(0.4, 0, 0.2, 1)";
    largeCardInner.style.transform = `rotateY(${largeCurrentDeg}deg)`;

    if (currentSide === "O") {
      window.setTimeout(() => {
        largeCardInner.style.transition = "none";
        largeCardInner.style.transform = "rotateY(0deg)";
        largeCurrentDeg = 0;
        requestAnimationFrame(() => requestAnimationFrame(() => {
          largeCardInner.style.transition = "";
        }));
      }, 660);
    }

    largeCardScene.classList.add("shimmering");
    window.setTimeout(() => largeCardScene.classList.remove("shimmering"), 700);
    spawnParticles(cx, cy, selectedCard.rarity);
  }


  document.getElementById("close-modal").addEventListener("click", closeModal);
  largeCardScene.addEventListener("click", flipLargeCard);
  viewport.addEventListener("pointerdown", handleLanePointerDown);
  viewport.addEventListener("pointermove", handleLanePointerMove);
  viewport.addEventListener("pointerup", handleLanePointerEnd);
  viewport.addEventListener("pointercancel", handleLanePointerEnd);
  viewport.addEventListener("touchstart", handleLaneTouchStart, { passive: true });
  viewport.addEventListener("touchmove", handleLaneTouchMove, { passive: false });
  viewport.addEventListener("touchend", handleLaneTouchEnd);
  viewport.addEventListener("touchcancel", handleLaneTouchEnd);
  track.addEventListener("click", (event) => {
    if (!suppressNextCardClick) return;
    event.preventDefault();
    event.stopImmediatePropagation();
    suppressNextCardClick = false;
  }, true);

  modal.addEventListener("click", (event) => {
    if (event.target === modal) closeModal();
  });

  window.addEventListener("resize", () => {
    measure();
    resetFlow();
  });

  document.addEventListener("visibilitychange", () => {
    lastTime = performance.now();
  });

  renderTrack();
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(animate);
</script>
