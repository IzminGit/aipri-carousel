<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>aipri-carousel</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --card-width: min(35vw, 150px);
    --lane-height: min(74vw, calc(100dvh - 72px), 330px);
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Maru Gothic ProN", sans-serif;
    background: linear-gradient(135deg, #ffe4f0 0%, #f4e7ff 48%, #e4f4ff 100%);
    color: #7a336c;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  .app {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 12px;
  }

  .lane-wrap {
    width: 100%;
    align-self: center;
    border-radius: 28px;
    padding: clamp(10px, 2.5dvh, 18px) 0;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.95), transparent 24%),
      linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0.36));
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,0.62),
      0 16px 40px rgba(188, 80, 160, 0.18);
    overflow: hidden;
    position: relative;
  }

  .lane-wrap::before,
  .lane-wrap::after {
    content: "";
    position: absolute;
    top: 0;
    width: 54px;
    height: 100%;
    z-index: 3;
    pointer-events: none;
  }

  .lane-wrap::before {
    left: 0;
    background: linear-gradient(90deg, rgba(255,228,240,0.98), transparent);
  }

  .lane-wrap::after {
    right: 0;
    background: linear-gradient(270deg, rgba(228,244,255,0.98), transparent);
  }

  .track-viewport {
    height: var(--lane-height);
    overflow: hidden;
    position: relative;
  }

  .track {
    position: absolute;
    left: 0;
    top: 50%;
    display: flex;
    align-items: center;
    gap: 16px;
    width: max-content;
    will-change: transform;
  }

  .card-button {
    width: var(--card-width);
    flex: 0 0 var(--card-width);
    border: none;
    background: transparent;
    padding: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .card-button:active {
    transform: scale(0.94);
  }

  .card {
    border-radius: 12px;
    overflow: hidden;
    background: rgba(255,255,255,0.85);
    box-shadow: 0 8px 26px rgba(180, 80, 160, 0.22);
    position: relative;
    min-height: 160px;
    display: grid;
    place-items: center;
    color: #c73691;
    font-weight: 900;
    font-size: 12px;
  }

  .card.rarity-4 {
    box-shadow: 0 8px 28px rgba(245, 190, 50, 0.44);
  }

  .card.rarity-3 {
    box-shadow: 0 8px 26px rgba(155, 155, 210, 0.34);
  }

  .card img {
    width: 100%;
    display: block;
    pointer-events: none;
  }

  .card-caption {
    margin-top: 6px;
    font-size: 10px;
    font-weight: 800;
    color: #b84893;
    line-height: 1.25;
    height: 2.5em;
    overflow: hidden;
    text-align: center;
    text-shadow: 0 1px 0 rgba(255,255,255,0.9);
  }

  .modal {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
    background: rgba(64, 22, 58, 0.48);
    z-index: 10;
  }

  .modal.open {
    display: grid;
  }

  .modal-card {
    width: min(calc((100dvh - 20px) * 0.6847), calc(100vw - 20px), 460px);
    aspect-ratio: 152 / 222;
    position: relative;
    display: grid;
    place-items: center;
  }

  .close-button {
    position: fixed;
    top: max(10px, env(safe-area-inset-top));
    right: max(10px, env(safe-area-inset-right));
    width: 38px;
    height: 38px;
    border: none;
    border-radius: 50%;
    background: rgba(247, 227, 242, 0.95);
    color: #b53686;
    font-size: 22px;
    font-weight: 900;
    z-index: 11;
  }

  .large-card-scene {
    width: 100%;
    height: 100%;
    perspective: 900px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .large-card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .large-card-face {
    position: absolute;
    inset: 0;
    border-radius: 18px;
    overflow: hidden;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    box-shadow: 0 12px 34px rgba(160, 80, 150, 0.26);
  }

  .large-card-face.card-back {
    transform: rotateY(180deg);
  }

  .large-card-face img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
  }

  .large-card-face::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.5) 50%, transparent 60%);
    background-size: 200% 200%;
    background-position: 200% 200%;
    border-radius: 18px;
    pointer-events: none;
  }

  .large-card-scene.shimmering .large-card-face::after {
    animation: shimmer 0.6s ease-out;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 200%; }
    100% { background-position: -50% -50%; }
  }

  .toast {
    position: fixed;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    padding: 9px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.94);
    color: #c73691;
    font-size: 12px;
    font-weight: 800;
    box-shadow: 0 8px 24px rgba(120, 40, 110, 0.18);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 20;
  }

  .toast.show {
    opacity: 1;
  }

  @media (min-width: 700px) {
    :root {
      --card-width: min(22vw, 180px);
      --lane-height: min(54vw, calc(100dvh - 72px), 390px);
    }

    .track {
      gap: 22px;
    }
  }

  @media (orientation: landscape) and (max-height: 500px) {
    :root {
      --card-width: min(22vw, 180px);
      --lane-height: min(54vw, calc(100dvh - 72px), 330px);
    }

    .app {
      padding: max(10px, env(safe-area-inset-top)) 0 max(10px, env(safe-area-inset-bottom));
    }

    .lane-wrap {
      border-radius: 0;
    }

    .modal {
      padding: max(6px, env(safe-area-inset-top)) 0 max(6px, env(safe-area-inset-bottom));
    }

    .modal-card {
      width: min(calc((100dvh - 12px) * 0.6847), 100vw, 460px);
    }
  }
</style>
</head>
<body>
<div class="app">
  <main class="lane-wrap">
    <div class="track-viewport" id="viewport" aria-label="カード表示エリア">
      <div class="track" id="track"></div>
    </div>
  </main>
</div>

<div class="modal" id="modal" role="dialog" aria-modal="true" aria-label="カード詳細">
  <section class="modal-card">
    <button class="close-button" id="close-modal" aria-label="閉じる">×</button>
    <div class="large-card-scene" id="large-card-scene">
      <div class="large-card-inner" id="large-card-inner">
        <div class="large-card-face card-front">
          <img id="large-front-image" src="" alt="カード表面" draggable="false" />
        </div>
        <div class="large-card-face card-back">
          <img id="large-back-image" src="" alt="カード裏面" draggable="false" />
        </div>
      </div>
    </div>
  </section>
</div>

<div class="toast" id="toast">カードを開きました</div>

<script>
  // aipri-card-view と同じ考え方:
  // base + card.id + "_O.webp" が表面、base + card.id + "_U.webp" が裏面
  const BASE_OA1 = "https://aipri.jp/card/img/oa1/";

  const CARDS = [
    { id:"OA1-001", name:"すきすきハートバズリウム",             char:"いのり", rarity:4, base:BASE_OA1 },
    { id:"OA1-002", name:"すきすきハートバズリウム",             char:"いのり", rarity:4, base:BASE_OA1 },
    { id:"OA1-003", name:"ゆめゆめスターバズリウム",             char:"あおい", rarity:4, base:BASE_OA1 },
    { id:"OA1-004", name:"ゆめゆめスターバズリウム",             char:"あおい", rarity:4, base:BASE_OA1 },
    { id:"OA1-005", name:"ゆうじょうスイーツバズリウム",          char:"ぐみ",   rarity:4, base:BASE_OA1 },
    { id:"OA1-006", name:"トキメキトゥインクルピンク",           char:"いのり", rarity:4, base:BASE_OA1 },
    { id:"OA1-007", name:"トキメキトゥインクルピンク",           char:"いのり", rarity:4, base:BASE_OA1 },
    { id:"OA1-008", name:"トキメキトゥインクルブルー",           char:"あおい", rarity:4, base:BASE_OA1 },
    { id:"OA1-009", name:"トキメキトゥインクルブルー",           char:"あおい", rarity:4, base:BASE_OA1 },
    { id:"OA1-010", name:"リボンアイドルピンク",                 char:"いのり", rarity:4, base:BASE_OA1 },
    { id:"OA1-011", name:"リボンアイドルブルー",                 char:"あおい", rarity:4, base:BASE_OA1 },
    { id:"OA1-012", name:"リボンアイドルグリーン",               char:"ぐみ",   rarity:4, base:BASE_OA1 },
    { id:"OA1-013", name:"ふわふわキャット",                     char:"いのり", rarity:4, base:BASE_OA1 },
    { id:"OA1-014", name:"ふわふわキャット",                     char:"あおい", rarity:4, base:BASE_OA1 },
    { id:"OA1-015", name:"ほしのゆうびんやさん",                 char:"あおい", rarity:4, base:BASE_OA1 },
    { id:"OA1-016", name:"ほしのゆうびんやさん",                 char:"いのり", rarity:4, base:BASE_OA1 },
    { id:"OA1-017", name:"ほしのゆうびんやさん",                 char:"ぐみ",   rarity:4, base:BASE_OA1 },
    { id:"OA1-018", name:"ポップンマシュマロ",                   char:"ぐみ",   rarity:4, base:BASE_OA1 },
    { id:"OA1-019", name:"ポップンマシュマロ",                   char:"いのり", rarity:4, base:BASE_OA1 },
    { id:"OA1-020", name:"ゆうじょうさくらツイン すきすきピンク", char:"いのり", rarity:4, base:BASE_OA1 }
  ];

  const track = document.getElementById("track");
  const viewport = document.getElementById("viewport");
  const modal = document.getElementById("modal");
  const largeCardScene = document.getElementById("large-card-scene");
  const largeCardInner = document.getElementById("large-card-inner");
  const largeFrontImage = document.getElementById("large-front-image");
  const largeBackImage = document.getElementById("large-back-image");
  const toast = document.getElementById("toast");

  let selectedCard = null;
  let currentSide = "O";
  let largeCurrentDeg = 0;
  let paused = false;
  let speedPxPerSec = 56;
  let x = 0;
  let trackWidth = 0;
  let lastTime = 0;
  let rafId = 0;

  function imgUrl(card, side) {
    return `${card.base}${card.id}_${side}.webp`;
  }

  function renderTrack() {
    track.innerHTML = "";

    // 2周分を描画。左に流れきったら位置を戻してループする。
    const loopCards = [...CARDS, ...CARDS];

    loopCards.forEach((card, index) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "card-button";
      button.setAttribute("aria-label", `${card.id} ${card.name} を開く`);

      const cardEl = document.createElement("div");
      cardEl.className = `card rarity-${card.rarity}`;

      const img = document.createElement("img");
      img.src = imgUrl(card, "O");
      img.alt = `${card.name} 表面`;
      img.loading = index < CARDS.length ? "eager" : "lazy";
      img.onerror = () => {
        cardEl.textContent = `${card.id}\n画像未取得`;
      };

      const caption = document.createElement("div");
      caption.className = "card-caption";
      caption.textContent = card.name;

      cardEl.appendChild(img);
      button.appendChild(cardEl);
      button.appendChild(caption);

      button.addEventListener("click", () => openCard(card, "O"));
      track.appendChild(button);
    });

    measure();
    resetFlow();
  }

  function measure() {
    // 2周分描画しているので、1周分の横幅
    trackWidth = Math.max(1, track.scrollWidth / 2);
    track.style.transform = `translate3d(${x}px, -50%, 0)`;
  }

  function resetFlow() {
    // 右端の外側から流れてくるように開始
    x = viewport.clientWidth + 16;
    lastTime = performance.now();
    track.style.transform = `translate3d(${x}px, -50%, 0)`;
    showToast("右から流し直します");
  }

  function animate(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000 || 0);
    lastTime = now;

    if (!paused) {
      x -= speedPxPerSec * dt;

      // 1周分流れたら、自然につながる位置へ戻す
      if (x <= -trackWidth) {
        x += trackWidth;
      }

      track.style.transform = `translate3d(${x}px, -50%, 0)`;
    }

    rafId = requestAnimationFrame(animate);
  }

  function openCard(card, side) {
    selectedCard = card;
    currentSide = side;
    paused = true;
    largeCurrentDeg = side === "U" ? 180 : 0;
    largeCardInner.style.transition = "none";
    largeCardInner.style.transform = `rotateY(${largeCurrentDeg}deg)`;

    largeFrontImage.src = imgUrl(card, "O");
    largeFrontImage.alt = `${card.name} 表面`;
    largeBackImage.src = imgUrl(card, "U");
    largeBackImage.alt = `${card.name} 裏面`;
    modal.classList.add("open");
    requestAnimationFrame(() => requestAnimationFrame(() => {
      largeCardInner.style.transition = "";
    }));
    showToast("カードを開きました");
  }

  function closeModal() {
    modal.classList.remove("open");
    selectedCard = null;
    paused = false;
    lastTime = performance.now();
  }

  function flipLargeCard() {
    if (!selectedCard) return;
    currentSide = currentSide === "O" ? "U" : "O";
    largeCurrentDeg += currentSide === "U" ? 180 : -180;
    largeCardInner.style.transition = "transform 0.65s cubic-bezier(0.4, 0, 0.2, 1)";
    largeCardInner.style.transform = `rotateY(${largeCurrentDeg}deg)`;
    largeCardScene.classList.add("shimmering");
    window.setTimeout(() => largeCardScene.classList.remove("shimmering"), 700);
  }

  function showToast(message) {
    toast.textContent = message;
    toast.classList.add("show");
    window.clearTimeout(showToast.timer);
    showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1000);
  }

  document.getElementById("close-modal").addEventListener("click", closeModal);
  largeCardScene.addEventListener("click", flipLargeCard);

  modal.addEventListener("click", (event) => {
    if (event.target === modal) closeModal();
  });

  window.addEventListener("resize", () => {
    measure();
    resetFlow();
  });

  document.addEventListener("visibilitychange", () => {
    lastTime = performance.now();
  });

  renderTrack();
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(animate);
</script>
</body>
</html>
